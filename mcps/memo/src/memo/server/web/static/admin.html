<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>memo ユーザー管理</title>
  <link rel="stylesheet" href="/static/admin.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>memo ユーザー管理</h1>
      <p class="subtitle">登録済みユーザーの追加・編集・削除を行います</p>
    </header>

    <section class="card">
      <h2>ユーザーを追加</h2>
      <form id="create-form" class="row">
        <input id="new-name" type="text" placeholder="ユーザー名 (必須・一意)" autocomplete="off" required />
        <input id="new-display" type="text" placeholder="表示名 (任意)" autocomplete="off" />
        <input id="new-note" type="text" placeholder="メモ (任意)" autocomplete="off" />
        <button type="submit" class="primary">追加</button>
      </form>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>ユーザー一覧</h2>
        <button id="reload" type="button" class="ghost">再読込</button>
      </div>
      <table id="user-table">
        <thead>
          <tr>
            <th>ユーザー名</th>
            <th>表示名</th>
            <th>備考</th>
            <th>作成日時</th>
            <th class="actions-col">操作</th>
          </tr>
        </thead>
        <tbody id="user-rows"></tbody>
      </table>
      <p id="empty" class="empty" hidden>ユーザーがいません。</p>
    </section>

    <section id="memo-card" class="card" hidden>
      <div class="card-head">
        <h2>「<span id="memo-user"></span>」のメモ一覧</h2>
        <div class="head-actions">
          <button id="memo-new" type="button" class="primary">新規メモ</button>
          <button id="memo-close" type="button" class="ghost">閉じる</button>
        </div>
      </div>
      <table id="memo-table">
        <thead>
          <tr>
            <th class="id-col">ID</th>
            <th>タイトル</th>
            <th>概要</th>
            <th>更新日時</th>
            <th class="actions-col">操作</th>
          </tr>
        </thead>
        <tbody id="memo-rows"></tbody>
      </table>
      <p id="memo-empty" class="empty" hidden>メモがありません。</p>
      <div id="memo-pager" class="pager" hidden>
        <button id="memo-prev" type="button" class="ghost">前へ</button>
        <span id="memo-pageinfo" class="muted"></span>
        <button id="memo-next" type="button" class="ghost">次へ</button>
      </div>
    </section>

    <section id="memo-edit-card" class="card" hidden>
      <div class="card-head">
        <h2 id="memo-edit-heading"></h2>
        <button id="memo-edit-back" type="button" class="ghost">← 一覧へ戻る</button>
      </div>
      <form id="memo-edit-form" class="form-vertical">
        <label class="field">
          <span class="field-label">タイトル (必須)</span>
          <input id="edit-memo-title" type="text" autocomplete="off" required />
        </label>
        <label class="field">
          <span class="field-label">概要 (任意)</span>
          <textarea id="edit-memo-summary" rows="8"></textarea>
        </label>
        <div class="form-actions">
          <button type="submit" class="primary">保存</button>
          <button id="memo-edit-cancel" type="button" class="ghost">キャンセル</button>
        </div>
      </form>
    </section>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="/static/admin.js"></script>
</body>
</html>
